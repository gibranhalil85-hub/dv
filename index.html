<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Collection</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:Arial,sans-serif;
    padding:20px;
}

/* Countdown Full Screen */
#loading-screen{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100vh;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

#countdown{
    font-size:120px;
    font-weight:bold;
    color:#ff0033;
}

/* Gallery */
.container{
    max-width:1400px;
    margin:auto;
    display:none;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:25px;
}

.box{
    background:#111;
    border-radius:15px;
    padding:15px;
    text-align:center;
    border:1px solid #222;
}

.cta-btn{
    display:flex;
    flex-direction:column;
    align-items:center;
    text-decoration:none;
}

.cta-btn img{
    width:100%;
    max-width:320px;
    border-radius:12px;
    margin-bottom:15px;
    box-shadow:0 0 20px rgba(255,255,255,.15);
    transition:.3s;
}

.cta-btn:hover img{
    transform:scale(1.03);
}

.watch-btn{
    color:#2196f3;
    font-size:20px;
    font-weight:bold;
    text-decoration:underline;
    transition:.3s;
}

.cta-btn:hover .watch-btn{
    color:#64b5f6;
    text-shadow:0 0 10px rgba(33,150,243,.8);
}

.note{
    margin-top:12px;
    color:#aaa;
    font-size:13px;
}

@media(max-width:768px){
    .container{
        grid-template-columns:repeat(2,1fr);
        gap:15px;
    }

    #countdown{
        font-size:90px;
    }

    .watch-btn{
        font-size:16px;
    }
}

</style>

</head>

<body>

<div id="loading-screen">

<script>

let time = 5;

const countdown = document.getElementById("countdown");
const loadingScreen = document.getElementById("loading-screen");
const gallery = document.getElementById("gallery");

const timer = setInterval(() => {

    time--;

    countdown.textContent = time;

    if(time <= 0){

        clearInterval(timer);

        loadingScreen.style.display = "none";
        gallery.style.display = "grid";

    }

},1000);

</script>
