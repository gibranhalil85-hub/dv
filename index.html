<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Collection</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:Arial,sans-serif;
    padding:20px;
}

.container{
    max-width:1400px;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:25px;
}

.box{
    background:#111;
    border-radius:15px;
    padding:15px;
    text-align:center;
    border:1px solid #222;
}

.count{
    font-size:60px;
    color:#ff0033;
    font-weight:bold;
    margin:20px 0;
}

.cta-btn{
    display:none;
    flex-direction:column;
    align-items:center;
    text-decoration:none;
}

.cta-btn img{
    width:100%;
    max-width:320px;
    border-radius:12px;
    margin-bottom:15px;
    box-shadow:0 0 20px rgba(255,255,255,.15);
    transition:0.3s;
}

.cta-btn:hover img{
    transform:scale(1.03);
}

.watch-btn{
    color:#2196f3;
    font-size:20px;
    font-weight:bold;
    text-decoration:underline;
    transition:.3s;
}

.cta-btn:hover .watch-btn{
    color:#64b5f6;
    text-shadow:0 0 10px rgba(33,150,243,.8);
}

.note{
    margin-top:12px;
    color:#aaa;
    font-size:13px;
}
</style>
</head>

<script>
document.querySelectorAll('.box').forEach(box => {

    let time = 5;

    const count = box.querySelector('.count');
    const btn = box.querySelector('.cta-btn');

    const timer = setInterval(() => {

        time--;
        count.textContent = time;

        if(time <= 0){

            clearInterval(timer);

            count.style.display = "none";
            btn.style.display = "flex";
        }

    },1000);

});
</script>
